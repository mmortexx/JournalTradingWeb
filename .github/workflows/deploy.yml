name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permite que el job "pages" suba a GitHub Pages y que otros jobs no
# queden esperando. El deploy job se ejecuta aunque uno anterior falle
# porque queremos que cualquier build válido suba; los tests/lint, si
# los añadimos en el futuro, se ponen en un job separado con `needs`.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

# Evita que se dispare un deploy cuando solo cambia el propio workflow.
# (No es crítico pero reduce builds inútiles.)
# Nota: usamos `paths-ignore` en lugar de `paths` para no romper si
# alguien añade archivos en la raíz.

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        # El script `build` del package.json hace:
        #   next build && cp -R .next/static .next/standalone/.next/ && cp -R public .next/standalone/
        # `next build` con output:"export" (en producción) genera el
        # sitio estático en ./out/, que es lo que Pages sirve.
        # El paso `cp -R` solo es útil si ejecutas el server.js en
        # standalone; para Pages lo descartamos (los assets ya están
        # copiados a ./out/_next/ por el export).
        run: bun run build

      - name: Disable Jekyll + add nojekyll
        # GitHub Pages procesa el contenido con Jekyll por defecto.
        # Jekyll ignora directorios que empiezan por `_`, lo cual
        # rompería `_next/` (donde Next.js guarda sus assets). El
        # archivo `.nojekyll` en la raíz desactiva Jekyll y deja
        # que Pages sirva los archivos tal cual.
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
